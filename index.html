<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #eee; margin: 0; }
        .box { background: #fff; padding: 30px; border: 1px solid #ccc; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #333; color: white; border: none; cursor: pointer; }
        button:hover { background: #555; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Acesso</h2>
        <form id="form-login">
            <input type="text" id="usuario" placeholder="Usuário (admin)">
            <input type="password" id="senha" placeholder="Senha (1234)">
            
            <button type="button" id="btn-entrar">ENTRAR</button>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var btn = document.getElementById('btn-entrar');

            if(btn){
                btn.addEventListener('click', function() {
                    var u = document.getElementById('usuario').value.trim();
                    var s = document.getElementById('senha').value.trim();

                    if (u === "admin" && s === "1234") {
                        // Salva o login
                        localStorage.setItem("logado", "sim");
                        
                        // REDIRECIONA PARA O DASHBOARD
                        // Atenção: O próximo arquivo deve se chamar dashboard.html (tudo minúsculo)
                        window.location.href = "dashboard.html";
                    } else {
                        alert("Erro. Tente admin / 1234");
                    }
                });
            }
        });
    </script>
</body>
</html>
